<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobby Giveaway</title>
    <style>
        @font-face {
            font-family: 'Dharma Gothic';
            src: url('fonts/dharma-gothic-m-ex-bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'Ropa Sans Pro';
            src: url('fonts/ropa-sans-pro-regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            background: transparent;
            position: relative;
            z-index: 1;
        }

        #foregroundCanvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        #bobbyBgWrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            min-width: 30rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #bobbyBg {
            width: 100%;
            height: auto;
            pointer-events: none;
            opacity: 0.25;
        }

        #chatPlayText {
            color: white;
            font-family: 'Dharma Gothic', sans-serif;
            font-size: 5rem;
            text-align: center;
            opacity: 0.4;
            margin-top: 3.5rem;
            letter-spacing: 0.05em;
        }

        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: none;
        }

        #winnersContainer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 3;
            font-family: 'Ropa Sans Pro', sans-serif;
            background: rgba(20, 35, 100, 0.6);
            padding: 0 20px;
            height: 78px;
        }

        .section-label {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
        }

        #leaderboardCards {
            display: flex;
            gap: 15px;
        }

        #recentGoalsContainer {
            display: flex;
            align-items: center;
            gap: 15px;
            overflow: hidden;
            flex: 1;
            min-width: 0;
            -webkit-mask-image: linear-gradient(to right, black calc(100% - 50px), transparent 100%);
            mask-image: linear-gradient(to right, black calc(100% - 50px), transparent 100%);
        }

        #recentGoalsList {
            display: flex;
            gap: 10px;
            flex-direction: row;
            overflow-x: hidden;
        }

        .ball-container {
            position: fixed;
            pointer-events: none;
            z-index: 4;
        }

        .ball-img {
            width: 100%;
            height: 100%;
            display: block;
            animation: spin linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .trail-element {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            border-radius: 50%;
            animation: fadeOut 0.5s linear forwards;
        }

        @keyframes fadeOut {
            from { opacity: 0.5; }
            to { opacity: 0; }
        }

        .ball-username {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 4px;
            padding: 4px 8px;
            background: rgba(25, 42, 86, 0.5);
            border-radius: 5px;
            color: white;
            font-size: 16px;
            font-family: Arial, sans-serif;
            white-space: nowrap;
            font-weight: normal;
        }


        .leaderboard-card {
            background: rgba(20, 35, 100, 0.85);
            padding: 10px 20px;
            border-radius: 10px;
            border: 3px solid;
            color: white;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease-out;
        }

        .leaderboard-card.gold {
            border-color: #FFD700;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .leaderboard-card.silver {
            border-color: #C0C0C0;
            box-shadow: 0 4px 20px rgba(192, 192, 192, 0.4);
        }

        .leaderboard-card.bronze {
            border-color: #CD7F32;
            box-shadow: 0 4px 20px rgba(205, 127, 50, 0.4);
        }

        .leaderboard-emoji {
            font-size: 28px;
            line-height: 1;
        }

        .leaderboard-username {
            font-size: 16px;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }

        .leaderboard-score {
            font-size: 20px;
            font-weight: bold;
            font-family: 'Dharma Gothic', sans-serif;
            color: #f5ac3e;
            white-space: nowrap;
        }

        .placeholder-message {
            background: rgba(20, 35, 100, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
        }

        .recent-goal-box {
            background: rgba(20, 35, 100, 0.7);
            padding: 8px 15px;
            border-radius: 5px;
            border: 2px solid;
            color: white;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }



        /* Countdown overlay */
        #countdownOverlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
        }

        #countdownNumber {
            font-family: 'Dharma Gothic', sans-serif;
            font-size: 320px;
            color: white;
            line-height: 1;
            text-shadow: 0 0 80px rgba(245, 172, 62, 0.5);
            animation: countPulse 0.9s ease-out forwards;
        }

        @keyframes countPulse {
            0%   { transform: scale(1.5); opacity: 0; }
            25%  { opacity: 1; }
            100% { transform: scale(1);   opacity: 1; }
        }

        /* Podium overlay */
        #podiumOverlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(5, 5, 20, 0.93);
            z-index: 20;
        }

        .podium-title {
            font-family: 'Dharma Gothic', sans-serif;
            font-size: 128px;
            color: #f5ac3e;
            line-height: 1;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        #podiumStage {
            display: flex;
            align-items: flex-end;
            gap: 20px;
        }

        .podium-spot {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 270px;
        }

        .podium-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .podium-player-name {
            font-family: 'Ropa Sans Pro', sans-serif;
            font-size: 30px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 18px;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .podium-player-score {
            font-family: 'Dharma Gothic', sans-serif;
            font-size: 38px;
            color: #f5ac3e;
            min-height: 44px;
        }

        .podium-block {
            width: 270px;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Dharma Gothic', sans-serif;
            font-size: 90px;
            color: rgba(255, 255, 255, 0.2);
            border-top: 3px solid;
        }

        .podium-block.first  { height: 230px; background: rgba(255, 215, 0, 0.1);   border-color: rgba(255, 215, 0, 0.45); }
        .podium-block.second { height: 175px; background: rgba(192, 192, 192, 0.1); border-color: rgba(192, 192, 192, 0.45); }
        .podium-block.third  { height: 125px; background: rgba(205, 127, 50, 0.1);  border-color: rgba(205, 127, 50, 0.45); }

        .podium-spot.empty { opacity: 0.25; }

        #newRoundBtn {
            margin-top: 48px;
            padding: 16px 56px;
            background: #f5ac3e;
            color: #0a0a1a;
            border: none;
            border-radius: 10px;
            font-family: 'Ropa Sans Pro', sans-serif;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s;
            letter-spacing: 0.5px;
        }

        #newRoundBtn:hover { background: #ffc25a; }

        /* Error card shown when no channel is configured */
        #error-card {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            font-family: Arial, sans-serif;
        }

        #error-card .card {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #f5ac3e;
            border-radius: 12px;
            padding: 40px 50px;
            text-align: center;
            max-width: 480px;
        }

        #error-card h2 {
            color: #f5ac3e;
            margin: 0 0 16px;
            font-size: 28px;
        }

        #error-card p {
            color: rgba(255, 255, 255, 0.8);
            margin: 0 0 24px;
            line-height: 1.5;
        }

        #error-card a {
            display: inline-block;
            background: #f5ac3e;
            color: #0a0a1a;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
        }

        #error-card a:hover {
            background: #ffc25a;
        }

        /* Round counter and timer in header bar */
        #roundScheduleInfo {
            display: none;
            align-items: center;
            gap: 10px;
        }

        #roundInfo {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.65);
            white-space: nowrap;
        }

        #roundTimer {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
        }

        #roundTimer.urgent {
            color: #ff6b6b;
        }

        /* Round stats shown on podium overlay */
        #roundStatsLine {
            margin-top: 20px;
            font-family: 'Ropa Sans Pro', sans-serif;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
        }

        /* Auto-advance countdown shown on podium overlay */
        #nextRoundInfo {
            margin-top: 12px;
            font-family: 'Ropa Sans Pro', sans-serif;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.6);
            display: none;
            letter-spacing: 0.5px;
        }

        /* Click-to-resume overlay (shown on refresh) */
        #resumeOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.55);
            cursor: pointer;
        }

        #resumeOverlay.active {
            display: flex;
        }

        #resumeOverlay span {
            font-family: 'Dharma Gothic', sans-serif;
            font-size: 52px;
            color: white;
            letter-spacing: 3px;
            opacity: 0.75;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="resumeOverlay"><span>Click to start</span></div>
    <div id="background">
        <div id="bobbyBgWrapper">
            <img id="bobbyBg" src="img/bobby-coin-catch-logo.png" alt="">
            <div id="chatPlayText">Type in the chat to play!</div>
        </div>
    </div>
    <div id="winnersContainer">
        <div class="section-label">Leaderboard</div>
        <div id="leaderboardCards"></div>
        <div id="recentGoalsContainer">
            <div class="section-label">Recent Goals</div>
            <div id="recentGoalsList"></div>
        </div>
        <div id="roundScheduleInfo">
            <div id="roundInfo"></div>
            <div id="roundTimer"></div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <canvas id="foregroundCanvas"></canvas>

    <div id="countdownOverlay">
        <div id="countdownNumber"></div>
    </div>

    <div id="podiumOverlay">
        <div class="podium-title">Round Over</div>
        <div id="podiumStage">
            <!-- 2nd (left) -->
            <div class="podium-spot" id="podium-2nd">
                <div class="podium-info">
                    <div class="podium-player-name">---</div>
                    <div class="podium-player-score"></div>
                </div>
                <div class="podium-block second">2</div>
            </div>
            <!-- 1st (centre, tallest) -->
            <div class="podium-spot" id="podium-1st">
                <div class="podium-info">
                    <div class="podium-player-name">---</div>
                    <div class="podium-player-score"></div>
                </div>
                <div class="podium-block first">1</div>
            </div>
            <!-- 3rd (right) -->
            <div class="podium-spot" id="podium-3rd">
                <div class="podium-info">
                    <div class="podium-player-name">---</div>
                    <div class="podium-player-score"></div>
                </div>
                <div class="podium-block third">3</div>
            </div>
        </div>
        <button id="newRoundBtn">Start New Round</button>
        <div id="roundStatsLine"></div>
        <div id="nextRoundInfo"></div>
    </div>

    <script src="scripts/tmi.bundle.js"></script>
    <script>
        console.log('Script loading...');

        // --- URL param config ---
        const urlParams = new URLSearchParams(window.location.search);
        const CONFIG = {
            channel:  urlParams.get('channel')  || null,
            trigger:  urlParams.get('trigger')  || 'all',  // 'all' | 'emote' | '!command'
            rounds:   urlParams.get('rounds')   ? parseInt(urlParams.get('rounds'))    : null,
            duration: urlParams.get('duration') ? parseFloat(urlParams.get('duration')) : null,
        };

        // --- Scheduled session config (null = manual mode) ---
        const SCHEDULE = (CONFIG.rounds > 0 && CONFIG.duration > 0) ? (() => {
            const RESULTS_SEC   = 10;
            const COUNTDOWN_SEC = 10;
            const totalSec      = CONFIG.duration * 60;
            const perRoundSec   = totalSec / CONFIG.rounds;
            const playSec       = Math.max(30, perRoundSec - COUNTDOWN_SEC - RESULTS_SEC);
            return {
                totalRounds:  CONFIG.rounds,
                playMs:       Math.round(playSec * 1000),
                resultsMs:    RESULTS_SEC * 1000,
                countdownMs:  COUNTDOWN_SEC * 1000,
            };
        })() : null;

        // Accessible by game methods that need to trigger the start overlay for session reset
        let _globalShowStartOverlay = null;

        // --- Missing channel: show error and halt ---
        if (!CONFIG.channel) {
            document.addEventListener('DOMContentLoaded', () => {
                document.body.innerHTML = `
                    <div id="error-card">
                        <div class="card">
                            <h2>No channel configured</h2>
                            <p>Open the setup page to generate a URL for your channel, then add it as an OBS browser source.</p>
                            <a href="index.html">Go to setup page</a>
                        </div>
                    </div>`;
            });
            throw new Error('No channel configured — open index.html to set up the game.');
        }

        function applyBackground() {
            const bg = document.getElementById('background');
            // Base #1b53a2 = ~60% Bobby's royal blue (#2272d0) blended with the dark navy (#0d1645)
            bg.style.background = [
                'radial-gradient(ellipse at 18% 22%, rgba(50, 130, 220, 0.45) 0%, transparent 52%)',
                'radial-gradient(ellipse at 80% 75%, rgba(13, 30, 80, 0.45) 0%, transparent 48%)',
                'radial-gradient(ellipse at 72% 16%, rgba(60, 148, 235, 0.3) 0%, transparent 40%)',
                'radial-gradient(ellipse at 28% 82%, rgba(22, 72, 160, 0.45) 0%, transparent 45%)',
                '#1b53a2'
            ].join(', ');
            bg.style.display = 'block';
        }

        class SimpleBasketGame {
            constructor() {
                console.log('Game initializing...');
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.fgCanvas = document.getElementById('foregroundCanvas');
                this.fgCtx = this.fgCanvas.getContext('2d');
                this.leaderboardContainer = document.getElementById('leaderboardCards');
                this.recentGoalsListDiv = document.getElementById('recentGoalsList');

                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());

                this.balls = [];
                this.basket = {
                    x: window.innerWidth / 2 - 72,
                    y: window.innerHeight - 265,
                    width: 144,
                    height: 15,
                    moveDirection: 1,
                    speed: 1,
                    sineT: Math.PI / 2,
                    sineSpeed: 0.006
                };

                this.gravity = 0.3;
                this.score = 0;
                this.attempts = 0;
                this.debugMode = false;
                this.roundEnded = false;
                this.countdownActive = false;
                this.ready = true;

                // Leaderboard tracking with timestamps for tie-breaking
                this.userScores = new Map(); // username -> { score, firstScoreTime, userColor, displayName }
                this.roundThrowers = new Set(); // unique participants per round
                this.previousTop3 = []; // Cache previous top 3 to avoid unnecessary re-renders

                // Visual scale for coins (makes them bigger without affecting physics hitbox)
                this.coinVisualScale = 2.0;

                // Preload coin animation frames
                this.coinFrames = [];
                for (let i = 1; i <= 6; i++) {
                    const img = new Image();
                    img.src = `img/bc-coin-${i}.png`;
                    this.coinFrames.push(img);
                }

                // Preload basket images
                this.bobbyBodyHappyImg = new Image();
                this.bobbyBodyHappyImg.src = 'img/bobby/Entrance_0028.png';

                // Preload entrance animation frames
                this.entranceFrames = [];
                for (let i = 0; i <= 27; i++) {
                    const img = new Image();
                    img.src = `img/bobby/Entrance_${String(i).padStart(4, '0')}.png`;
                    this.entranceFrames.push(img);
                }
                this.entranceFrame = 27;
                this.entranceAnimating = false;
                this.entranceLastFrameTime = 0;

                this.scoreFlashUntil = 0;
                this.scoreFlashStart = 0;
                this.wobbleCounter = 0;

                // Scheduled round tracking
                this.currentRound      = 1;
                this.roundTimerEndTime = null;
                this.roundTimerInterval = null;

                if (SCHEDULE) {
                    const secs = Math.round(SCHEDULE.playMs / 1000);
                    const m    = Math.floor(secs / 60);
                    const s    = secs % 60;
                    document.getElementById('roundScheduleInfo').style.display = 'flex';
                    document.getElementById('roundTimer').textContent = `${m}:${String(s).padStart(2,'0')}`;
                    this.updateRoundInfo();
                }

                this.setupSounds();
                this.setupTwitchChat();
                this.initializePlaceholders();
                this.gameLoop();
                console.log('Game initialized successfully');
            }

            startEntranceAnimation() {
                this.entranceFrame = 0;
                this.entranceAnimating = true;
                this.entranceLastFrameTime = Date.now();
            }

            updateRoundInfo() {
                if (!SCHEDULE) return;
                document.getElementById('roundInfo').textContent = `Round ${this.currentRound} / ${SCHEDULE.totalRounds}`;
            }

            updateRoundTimerDisplay() {
                if (!SCHEDULE) return;
                const remaining = Math.max(0, this.roundTimerEndTime - Date.now());
                const totalSecs = Math.ceil(remaining / 1000);
                const mins = Math.floor(totalSecs / 60);
                const secs = totalSecs % 60;
                const el = document.getElementById('roundTimer');
                el.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
                el.classList.toggle('urgent', totalSecs <= 10);
            }

            startRoundTimer() {
                if (!SCHEDULE) return;
                this.roundTimerEndTime = Date.now() + SCHEDULE.playMs;
                this.updateRoundTimerDisplay();
                clearInterval(this.roundTimerInterval);
                this.roundTimerInterval = setInterval(() => {
                    if (this.roundEnded) {
                        clearInterval(this.roundTimerInterval);
                        this.roundTimerInterval = null;
                        return;
                    }
                    const remaining = this.roundTimerEndTime - Date.now();
                    if (!this.countdownActive && remaining <= 0) {
                        this.startEndRoundCountdown();
                    } else {
                        this.updateRoundTimerDisplay();
                    }
                }, 100);
            }

            stopRoundTimer() {
                clearInterval(this.roundTimerInterval);
                this.roundTimerInterval = null;
            }

            initializePlaceholders() {
                // Initialize leaderboard placeholder
                const leaderboardPlaceholder = document.createElement('div');
                leaderboardPlaceholder.className = 'placeholder-message';
                leaderboardPlaceholder.textContent = 'No scores yet';
                this.leaderboardContainer.appendChild(leaderboardPlaceholder);

                // Initialize recent goals placeholder
                const recentGoalsPlaceholder = document.createElement('div');
                recentGoalsPlaceholder.className = 'placeholder-message';
                recentGoalsPlaceholder.textContent = 'No goals yet';
                this.recentGoalsListDiv.appendChild(recentGoalsPlaceholder);
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.fgCanvas.width = window.innerWidth;
                this.fgCanvas.height = window.innerHeight;
            }

            setupSounds() {
                this.sounds = {};
                this.masterVolume = 0.7;

                const soundConfig = {
                    tick:       { file: 'sounds/tick.mp3',          volume: 0.3 },
                    whip1:      { file: 'sounds/whip-1.mp3',        volume: 0.5 },
                    whip2:      { file: 'sounds/whip-2.mp3',        volume: 0.5 },
                    whip3:      { file: 'sounds/whip-3.mp3',        volume: 0.5 },
                    whip4:      { file: 'sounds/whip-4.mp3',        volume: 0.5 },
                    whip5:      { file: 'sounds/whip-5.mp3',        volume: 0.5 },
                    whip6:      { file: 'sounds/whip-6.mp3',        volume: 0.5 },
                    score:      { file: 'sounds/victory-coins.mp3', volume: 0.5 },
                    rimBounce1: { file: 'sounds/twang.mp3',         volume: 0.4 },
                    rimBounce2: { file: 'sounds/twang-2.mp3',       volume: 0.4 },
                    rimBounce3: { file: 'sounds/twang-3.mp3',       volume: 0.4 },
                    rimBounce4: { file: 'sounds/twang-4.mp3',       volume: 0.4 },
                };

                this.whipSounds = ['whip1', 'whip2', 'whip3', 'whip4', 'whip5', 'whip6'];
                this.rimSounds = ['rimBounce1', 'rimBounce2', 'rimBounce3', 'rimBounce4'];
                this.lastRimSound = null;

                Object.keys(soundConfig).forEach(key => {
                    const config = soundConfig[key];
                    const audio = new Audio();
                    audio.preload = 'auto';
                    audio.volume = config.volume * this.masterVolume;
                    audio.addEventListener('error', () => {});
                    audio.src = config.file;
                    this.sounds[key] = { audio, baseVolume: config.volume };
                });
            }

            playSound(soundName) {
                if (!this.sounds[soundName]) return;
                try {
                    const { audio, baseVolume } = this.sounds[soundName];
                    audio.currentTime = 0;
                    audio.volume = baseVolume * this.masterVolume;
                    audio.play().catch(() => {});
                } catch (e) {}
            }

            recordScore(username, displayName, userColor) {
                const currentTime = Date.now();

                if (this.userScores.has(username)) {
                    const userData = this.userScores.get(username);
                    userData.score++;
                } else {
                    this.userScores.set(username, {
                        score: 1,
                        firstScoreTime: currentTime,
                        userColor: userColor,
                        displayName: displayName
                    });
                }

                this.addRecentGoal(displayName, userColor);
                this.updateLeaderboard();
            }

            addRecentGoal(displayName, userColor) {
                const placeholder = this.recentGoalsListDiv.querySelector('.placeholder-message');
                if (placeholder) {
                    placeholder.remove();
                }

                const goalBox = document.createElement('div');
                goalBox.className = 'recent-goal-box';
                goalBox.textContent = displayName;

                const color = userColor || '#ffffff';
                if (color.startsWith('#')) {
                    const hex = color.slice(1);
                    const r = parseInt(hex.substr(0, 2), 16);
                    const g = parseInt(hex.substr(2, 2), 16);
                    const b = parseInt(hex.substr(4, 2), 16);
                    goalBox.style.borderColor = `rgba(${r}, ${g}, ${b}, 0.7)`;
                } else {
                    goalBox.style.borderColor = color;
                }

                this.recentGoalsListDiv.insertBefore(goalBox, this.recentGoalsListDiv.firstChild);
            }

            getTop3Players() {
                const sortedPlayers = Array.from(this.userScores.entries())
                    .map(([username, data]) => ({ username, ...data }))
                    .sort((a, b) => {
                        if (b.score !== a.score) return b.score - a.score;
                        return a.firstScoreTime - b.firstScoreTime;
                    });

                return sortedPlayers.slice(0, 3);
            }

            updateLeaderboard() {
                const top3 = this.getTop3Players();

                const hasChanged = this.hasLeaderboardChanged(top3);

                if (!hasChanged) {
                    const scoreElements = this.leaderboardContainer.querySelectorAll('.leaderboard-score');
                    top3.forEach((player, index) => {
                        if (scoreElements[index]) {
                            scoreElements[index].textContent = `${player.score} ${player.score === 1 ? 'point' : 'points'}`;
                        }
                    });
                    return;
                }

                this.previousTop3 = top3.map(p => ({ username: p.username, score: p.score }));
                this.leaderboardContainer.innerHTML = '';

                if (top3.length === 0) {
                    const placeholder = document.createElement('div');
                    placeholder.className = 'placeholder-message';
                    placeholder.textContent = 'No scores yet';
                    this.leaderboardContainer.appendChild(placeholder);
                    return;
                }

                const medals = [
                    { emoji: '🥇', class: 'gold' },
                    { emoji: '🥈', class: 'silver' },
                    { emoji: '🥉', class: 'bronze' }
                ];

                top3.forEach((player, index) => {
                    const card = document.createElement('div');
                    card.className = `leaderboard-card ${medals[index].class}`;

                    const emoji = document.createElement('div');
                    emoji.className = 'leaderboard-emoji';
                    emoji.textContent = medals[index].emoji;

                    const username = document.createElement('div');
                    username.className = 'leaderboard-username';
                    username.textContent = player.displayName;

                    const score = document.createElement('div');
                    score.className = 'leaderboard-score';
                    score.textContent = `${player.score} ${player.score === 1 ? 'point' : 'points'}`;

                    card.appendChild(emoji);
                    card.appendChild(username);
                    card.appendChild(score);

                    this.leaderboardContainer.appendChild(card);
                });

            }

            hasLeaderboardChanged(currentTop3) {
                if (currentTop3.length !== this.previousTop3.length) return true;
                for (let i = 0; i < currentTop3.length; i++) {
                    if (currentTop3[i].username !== this.previousTop3[i].username) return true;
                }
                return false;
            }

            setupTwitchChat() {
                console.log(`Setting up Twitch chat connection to: ${CONFIG.channel}`);

                if (typeof tmi === 'undefined') {
                    console.error('tmi.js failed to load. Check internet connection.');
                    return;
                }

                this.client = new tmi.Client({
                    channels: [CONFIG.channel]
                });

                this.client.connect().then(() => {
                    console.log(`Connected to Twitch chat: ${CONFIG.channel}`);
                }).catch(err => {
                    console.error('Failed to connect to Twitch:', err);
                });

                this.client.on('message', (channel, tags, message, self) => {
                    if (self) return;
                    if (!this.ready) return;
                    if (this.roundEnded) return;

                    // Trigger filtering
                    if (CONFIG.trigger === 'emote') {
                        if (!tags.emotes || Object.keys(tags.emotes).length === 0) return;
                    } else if (CONFIG.trigger !== 'all') {
                        // Custom command: startsWith match, case-insensitive
                        if (!message.toLowerCase().trim().startsWith(CONFIG.trigger.toLowerCase())) return;
                    }

                    const username = tags.username || tags['display-name'] || 'Anonymous';
                    console.log(`${username} triggered a throw: "${message}"`);
                    this.playSound('tick');
                    this.throwBall(username, tags);
                });

                this.client.on('connected', (addr, port) => {
                    console.log(`Connected to Twitch IRC at ${addr}:${port}`);
                });

                this.client.on('disconnected', (reason) => {
                    console.log(`Disconnected from Twitch: ${reason}`);
                });
            }

            startEndRoundCountdown() {
                if (this.countdownActive || this.roundEnded) return;
                this.countdownActive = true;

                // Both the big overlay and the small top-right timer are derived from
                // this same endTime so they always show the same value.
                const endTime = Date.now() + SCHEDULE.countdownMs;
                if (SCHEDULE) this.roundTimerEndTime = endTime;

                const overlay  = document.getElementById('countdownOverlay');
                const numberEl = document.getElementById('countdownNumber');
                overlay.style.display = 'flex';

                const setNumber = (n) => {
                    numberEl.textContent = n;
                    numberEl.style.animation = 'none';
                    numberEl.offsetHeight; // force reflow
                    numberEl.style.animation = 'countPulse 0.9s ease-out forwards';
                };

                let lastShown = -1;
                const show = (n) => { if (n !== lastShown) { setNumber(n); lastShown = n; } };

                show(Math.ceil((endTime - Date.now()) / 1000));

                const tick = setInterval(() => {
                    const remaining = Math.ceil((endTime - Date.now()) / 1000);
                    if (remaining <= 0) {
                        clearInterval(tick);
                        overlay.style.display = 'none';
                        this.countdownActive = false;
                        this.roundEnded = true;
                        this.showPodium();
                    } else {
                        show(remaining);
                    }
                }, 100);
            }

            showPodium() {
                // Snapshot per-round stats before any reset
                const roundShots        = this.attempts;
                const roundParticipants = this.roundThrowers.size;
                const roundGoals        = this.score;

                // Clear any balls still in flight
                this.balls.forEach(b => b.element.remove());
                this.balls = [];

                const top3 = this.getTop3Players();

                // Podium order: 2nd (left), 1st (centre), 3rd (right)
                const slots = [
                    { id: 'podium-2nd', player: top3[1] },
                    { id: 'podium-1st', player: top3[0] },
                    { id: 'podium-3rd', player: top3[2] },
                ];

                slots.forEach(({ id, player }) => {
                    const spot    = document.getElementById(id);
                    const nameEl  = spot.querySelector('.podium-player-name');
                    const scoreEl = spot.querySelector('.podium-player-score');

                    if (player) {
                        nameEl.textContent        = player.displayName;
                        nameEl.style.borderColor  = player.userColor || 'rgba(255,255,255,0.25)';
                        scoreEl.textContent       = `${player.score} ${player.score === 1 ? 'point' : 'points'}`;
                        spot.classList.remove('empty');
                    } else {
                        nameEl.textContent        = '---';
                        nameEl.style.borderColor  = 'rgba(255,255,255,0.15)';
                        scoreEl.textContent       = '';
                        spot.classList.add('empty');
                    }
                });

                const podiumTitle = document.querySelector('.podium-title');
                if (SCHEDULE && this.currentRound === SCHEDULE.totalRounds) {
                    podiumTitle.textContent = 'Final Round';
                } else {
                    podiumTitle.textContent = 'Round Over';
                }

                document.getElementById('roundStatsLine').textContent =
                    `${roundShots} ${roundShots === 1 ? 'shot' : 'shots'}  ·  ${roundParticipants} ${roundParticipants === 1 ? 'player' : 'players'}  ·  ${roundGoals} ${roundGoals === 1 ? 'goal' : 'goals'}`;

                document.getElementById('podiumOverlay').style.display = 'flex';

                if (SCHEDULE) {
                    const isLastRound = this.currentRound >= SCHEDULE.totalRounds;
                    document.getElementById('newRoundBtn').style.display = 'none';
                    const nextRoundInfo = document.getElementById('nextRoundInfo');
                    nextRoundInfo.style.display = 'block';

                    const label = isLastRound ? 'Session complete' : `Round ${this.currentRound + 1} starting`;
                    let secsLeft = Math.round(SCHEDULE.resultsMs / 1000);
                    nextRoundInfo.textContent = `${label} in ${secsLeft}s`;

                    const advanceTimer = setInterval(() => {
                        secsLeft--;
                        if (secsLeft <= 0) {
                            clearInterval(advanceTimer);
                            document.getElementById('podiumOverlay').style.display = 'none';
                            nextRoundInfo.style.display = 'none';
                            document.getElementById('newRoundBtn').style.display = '';
                            if (isLastRound) {
                                this.currentRound = 1;
                                this.startNewRound();
                                if (_globalShowStartOverlay) _globalShowStartOverlay();
                            } else {
                                this.currentRound++;
                                this.startNewRound();
                                this.startRoundTimer();
                            }
                        } else {
                            nextRoundInfo.textContent = `${label} in ${secsLeft}s`;
                        }
                    }, 1000);
                }
            }

            startNewRound() {
                this.updateRoundInfo();

                // Clear balls
                this.balls.forEach(b => b.element.remove());
                this.balls = [];

                // Reset scores
                this.userScores.clear();
                this.previousTop3 = [];
                this.score    = 0;
                this.attempts = 0;
                this.roundThrowers.clear();

                // Reset leaderboard display
                this.leaderboardContainer.innerHTML = '';
                const lbPlaceholder = document.createElement('div');
                lbPlaceholder.className   = 'placeholder-message';
                lbPlaceholder.textContent = 'No scores yet';
                this.leaderboardContainer.appendChild(lbPlaceholder);

                // Reset recent goals display
                this.recentGoalsListDiv.innerHTML = '';
                const rgPlaceholder = document.createElement('div');
                rgPlaceholder.className   = 'placeholder-message';
                rgPlaceholder.textContent = 'No goals yet';
                this.recentGoalsListDiv.appendChild(rgPlaceholder);

                // Reset state
                this.roundEnded      = false;
                this.countdownActive = false;

                document.getElementById('podiumOverlay').style.display = 'none';

                // Reset round timer display to full duration
                if (SCHEDULE) {
                    const secs = Math.round(SCHEDULE.playMs / 1000);
                    const m    = Math.floor(secs / 60);
                    const s    = secs % 60;
                    const timerEl = document.getElementById('roundTimer');
                    timerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
                    timerEl.classList.remove('urgent');
                }

                this.startEntranceAnimation();
            }

            throwBall(username, tags = {}) {
                this.attempts++;
                this.roundThrowers.add(username);
                console.log(`${username} threw a ball! Attempt #${this.attempts} (Active balls: ${this.balls.length})`);

                const basketCenterX = this.basket.x + this.basket.width / 2;
                const minDistance = 200;
                let startX;

                if (Math.random() < 0.5) {
                    const leftRange = basketCenterX - minDistance - 100;
                    if (leftRange > 0) {
                        startX = Math.random() * leftRange + 100;
                    } else {
                        startX = 50;
                    }
                } else {
                    const rightStart = basketCenterX + minDistance;
                    const rightRange = window.innerWidth - rightStart - 100;
                    if (rightRange > 0) {
                        startX = rightStart + Math.random() * rightRange;
                    } else {
                        startX = window.innerWidth - 50;
                    }
                }

                if (isNaN(startX) || startX < 50 || startX > window.innerWidth - 50) {
                    startX = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
                }

                const isAccurateShot = Math.random() < 0.01;

                let vx, vy;
                if (isAccurateShot) {
                    vx = (Math.random() - 0.5) * 8;
                    vy = -12 - Math.random() * 4;
                } else {
                    vx = (Math.random() - 0.5) * 25;
                    vy = -8 - Math.random() * 12;
                }

                const minHorizontalVelocity = 0.5;
                if (Math.abs(vx) < minHorizontalVelocity) {
                    vx = vx >= 0 ? minHorizontalVelocity : -minHorizontalVelocity;
                }

                const userColor = tags.color || this.getRandomColor();
                const displayName = tags['display-name'] || username;
                const ballColor = this.getVariedColor(userColor);

                if (isNaN(vx) || isNaN(vy) || !ballColor || ballColor === '#000000') {
                    console.error(`Invalid ball data for ${username}`);
                    return;
                }

                const visualSize = 12 * this.coinVisualScale * 2;
                const container = document.createElement('div');
                container.className = 'ball-container';
                container.style.width = visualSize + 'px';
                container.style.height = visualSize + 'px';
                container.style.left = (startX - visualSize / 2) + 'px';
                container.style.top = (window.innerHeight - 150 - visualSize / 2) + 'px';

                const spinSpeed = 0.5 + Math.random() * 1.0;
                const coinCanvas = document.createElement('canvas');
                coinCanvas.width = visualSize;
                coinCanvas.height = visualSize;
                coinCanvas.style.width = visualSize + 'px';
                coinCanvas.style.height = visualSize + 'px';
                coinCanvas.style.display = 'block';
                coinCanvas.className = 'ball-img';
                coinCanvas.style.animationDuration = spinSpeed + 's';
                container.appendChild(coinCanvas);

                const label = document.createElement('div');
                label.className = 'ball-username';
                label.textContent = displayName;
                label.style.border = `1px solid ${userColor}`;
                container.appendChild(label);

                document.body.appendChild(container);

                const ball = {
                    x: startX,
                    y: window.innerHeight - 150,
                    vx: vx,
                    vy: vy,
                    radius: 12,
                    color: ballColor,
                    scored: false,
                    username: username,
                    displayName: displayName,
                    userColor: userColor,
                    lastRimBounce: 0,
                    lastNearMiss: 0,
                    element: container,
                    visualSize: visualSize,
                    trailCounter: 0,
                    coinCanvas: coinCanvas,
                    coinCtx: coinCanvas.getContext('2d'),
                    frameIndex: Math.floor(Math.random() * 6),
                    frameTimer: 0
                };

                // Draw initial frame immediately
                const initFrame = this.coinFrames[ball.frameIndex];
                if (initFrame.complete && initFrame.naturalWidth > 0) {
                    ball.coinCtx.drawImage(initFrame, 0, 0, ball.coinCanvas.width, ball.coinCanvas.height);
                }

                this.balls.push(ball);
                this.updateScore();
            }

            createTrailElement(ball) {
                const trailSize = ball.radius * 0.75;
                const trail = document.createElement('div');
                trail.className = 'trail-element';
                trail.style.width = (trailSize * 2) + 'px';
                trail.style.height = (trailSize * 2) + 'px';
                trail.style.left = (ball.x - trailSize) + 'px';
                trail.style.top = (ball.y - trailSize) + 'px';
                trail.style.backgroundColor = ball.color;

                document.body.appendChild(trail);

                setTimeout(() => {
                    trail.remove();
                }, 500);
            }

            getRandomRimSound() {
                const availableSounds = this.rimSounds.filter(sound => sound !== this.lastRimSound);
                const randomSound = availableSounds[Math.floor(Math.random() * availableSounds.length)];
                this.lastRimSound = randomSound;
                return randomSound;
            }

            getRandomWhipSound() {
                return this.whipSounds[Math.floor(Math.random() * this.whipSounds.length)];
            }

            getRandomColor() {
                const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            getVariedColor(baseColor) {
                if (!baseColor || !baseColor.startsWith('#')) {
                    return this.getRandomColor();
                }

                const hex = baseColor.slice(1);
                const r = parseInt(hex.substr(0, 2), 16) / 255;
                const g = parseInt(hex.substr(2, 2), 16) / 255;
                const b = parseInt(hex.substr(4, 2), 16) / 255;

                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) {
                    h = s = 0;
                } else {
                    const d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                        case g: h = (b - r) / d + 2; break;
                        case b: h = (r - g) / d + 4; break;
                    }
                    h /= 6;
                }

                h = (h + (Math.random() - 0.5) * 0.1) % 1;
                s = Math.max(0, Math.min(1, s + (Math.random() - 0.5) * 0.2));
                l = Math.max(0.3, Math.min(0.8, l + (Math.random() - 0.5) * 0.2));

                const hsl2rgb = (h, s, l) => {
                    const a = s * Math.min(l, 1 - l);
                    const f = n => {
                        const k = (n + h * 12) % 12;
                        return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                    };
                    return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
                };

                const [newR, newG, newB] = hsl2rgb(h, s, l);
                return `#${newR.toString(16).padStart(2, '0')}${newG.toString(16).padStart(2, '0')}${newB.toString(16).padStart(2, '0')}`;
            }

            updatePhysics() {

                const leftBound  = 250;
                const rightBound = window.innerWidth - this.basket.width - 250;
                this.basket.sineT += this.basket.sineSpeed;
                this.basket.x = leftBound + (rightBound - leftBound) * (Math.sin(this.basket.sineT) + 1) / 2;

                for (let i = this.balls.length - 1; i >= 0; i--) {
                    const ball = this.balls[i];

                    ball.x += ball.vx;
                    ball.y += ball.vy;
                    ball.vy += this.gravity;

                    if (!ball.scored) {
                        ball.trailCounter++;
                        if (ball.trailCounter >= 2) {
                            this.createTrailElement(ball);
                            ball.trailCounter = 0;
                        }
                    }

                    ball.element.style.left = (ball.x - ball.visualSize / 2) + 'px';
                    ball.element.style.top = (ball.y - ball.visualSize / 2) + 'px';

                    // Advance coin animation frame (~12fps at 60fps physics)
                    ball.frameTimer++;
                    if (ball.frameTimer >= 5) {
                        ball.frameTimer = 0;
                        ball.frameIndex = (ball.frameIndex + 1) % this.coinFrames.length;
                        const frame = this.coinFrames[ball.frameIndex];
                        if (frame.complete && frame.naturalWidth > 0) {
                            ball.coinCtx.clearRect(0, 0, ball.coinCanvas.width, ball.coinCanvas.height);
                            ball.coinCtx.drawImage(frame, 0, 0, ball.coinCanvas.width, ball.coinCanvas.height);
                        }
                    }

                    if (ball.y > window.innerHeight) {
                        ball.element.remove();
                        this.balls.splice(i, 1);
                        continue;
                    }

                    if (Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) {
                        ball.element.remove();
                        this.balls.splice(i, 1);
                        continue;
                    }

                    if (ball.x - ball.radius <= 0) {
                        ball.vx = Math.abs(ball.vx) * 0.8;
                    }
                    if (ball.x + ball.radius >= window.innerWidth) {
                        ball.vx = -Math.abs(ball.vx) * 0.8;
                    }
                    if (ball.y - ball.radius <= 0) {
                        ball.vy = Math.abs(ball.vy) * 0.8;
                    }

                    const basketSnapshot = {
                        x: this.basket.x,
                        y: this.basket.y,
                        width: this.basket.width,
                        height: this.basket.height
                    };

                    const rimY = basketSnapshot.y + basketSnapshot.height / 2;
                    const proximityMargin = 30;

                    const isNearBasket = ball.vy > 0 &&
                        ball.x >= (basketSnapshot.x - proximityMargin) &&
                        ball.x <= (basketSnapshot.x + basketSnapshot.width + proximityMargin) &&
                        ball.y >= (rimY - proximityMargin) &&
                        ball.y <= (rimY + proximityMargin);

                    if (isNearBasket) {
                        const hadCollision = this.checkRimCollision(ball, basketSnapshot);

                        if (!hadCollision) {
                            this.checkNearMiss(ball, basketSnapshot);
                        }

                        if (!ball.scored) {
                            this.checkScoring(ball, basketSnapshot);
                        }
                    }
                }
            }

            checkNearMiss(ball, basket) {
                const leftRimX = basket.x;
                const rightRimX = basket.x + basket.width;
                const rimY = basket.y + basket.height / 2;
                const rimRadius = 4;
                const nearMissMargin = 30;

                const leftDx = ball.x - leftRimX;
                const leftDy = ball.y - rimY;
                const leftDistance = Math.sqrt(leftDx * leftDx + leftDy * leftDy);

                const rightDx = ball.x - rightRimX;
                const rightDy = ball.y - rimY;
                const rightDistance = Math.sqrt(rightDx * rightDx + rightDy * rightDy);

                const collisionDistance = ball.radius + rimRadius;
                const nearMissDistance = collisionDistance + nearMissMargin;

                const isNearMissLeft = leftDistance > collisionDistance && leftDistance < nearMissDistance;
                const isNearMissRight = rightDistance > collisionDistance && rightDistance < nearMissDistance;

                if (isNearMissLeft || isNearMissRight) {
                    this.playSound(this.getRandomWhipSound());
                    return true;
                }

                return false;
            }

            checkRimCollision(ball, basket) {
                const leftRimX = basket.x;
                const rightRimX = basket.x + basket.width;
                const rimY = basket.y + basket.height / 2;
                const rimRadius = 4;

                const currentTime = Date.now();
                const bounceThreshold = 100;

                const leftDx = ball.x - leftRimX;
                const leftDy = ball.y - rimY;
                const leftDistance = Math.sqrt(leftDx * leftDx + leftDy * leftDy);

                if (leftDistance < ball.radius + rimRadius) {
                    const normalX = leftDx / leftDistance;
                    const normalY = leftDy / leftDistance;

                    const dotProduct = ball.vx * normalX + ball.vy * normalY;
                    ball.vx = ball.vx - 2 * dotProduct * normalX;
                    ball.vy = ball.vy - 2 * dotProduct * normalY;

                    ball.vx *= 0.7;
                    ball.vy *= 0.7;

                    const overlap = ball.radius + rimRadius - leftDistance;
                    ball.x += normalX * overlap;
                    ball.y += normalY * overlap;

                    if (currentTime - ball.lastRimBounce > bounceThreshold) {
                        this.playSound(this.getRandomRimSound());
                        ball.lastRimBounce = currentTime;
                    }

                    return true;
                }

                const rightDx = ball.x - rightRimX;
                const rightDy = ball.y - rimY;
                const rightDistance = Math.sqrt(rightDx * rightDx + rightDy * rightDy);

                if (rightDistance < ball.radius + rimRadius) {
                    const normalX = rightDx / rightDistance;
                    const normalY = rightDy / rightDistance;

                    const dotProduct = ball.vx * normalX + ball.vy * normalY;
                    ball.vx = ball.vx - 2 * dotProduct * normalX;
                    ball.vy = ball.vy - 2 * dotProduct * normalY;

                    ball.vx *= 0.7;
                    ball.vy *= 0.7;

                    const overlap = ball.radius + rimRadius - rightDistance;
                    ball.x += normalX * overlap;
                    ball.y += normalY * overlap;

                    if (currentTime - ball.lastRimBounce > bounceThreshold) {
                        this.playSound(this.getRandomRimSound());
                        ball.lastRimBounce = currentTime;
                    }

                    return true;
                }

                return false;
            }

            checkScoring(ball, basket) {
                const rimMargin = 0;
                const leftScoringX = basket.x + rimMargin;
                const rightScoringX = basket.x + basket.width - rimMargin;
                const rimY = basket.y + basket.height / 2;
                const scoringZoneHeight = 30;

                if (!ball.prevY) ball.prevY = ball.y;

                if (ball.vy <= 0) {
                    ball.prevY = ball.y;
                    return false;
                }

                const isInScoringZoneX = ball.x > leftScoringX && ball.x < rightScoringX;
                if (!isInScoringZoneX) {
                    ball.prevY = ball.y;
                    return false;
                }

                const isPassingThrough = ball.prevY < rimY && ball.y >= rimY;
                const isInScoringZoneY = ball.y >= rimY && ball.y <= rimY + scoringZoneHeight;

                ball.prevY = ball.y;

                if (isPassingThrough && isInScoringZoneY) {
                    ball.scored = true;
                    ball.element.style.display = 'none';
                    this.score++;
                    this.scoreFlashStart = Date.now();
                    this.scoreFlashUntil = this.scoreFlashStart + 350;
                    this.updateScore();
                    this.playSound('score');
                    this.recordScore(ball.username, ball.displayName, ball.userColor);
                    return true;
                }

                return false;
            }

            updateScore() {
                const percentage = this.attempts > 0 ? Math.round((this.score / this.attempts) * 100) : 0;
                console.log(`Score: ${this.score}/${this.attempts} (${percentage}%)`);
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.fgCtx.clearRect(0, 0, this.fgCanvas.width, this.fgCanvas.height);

                this.drawBasket();
                if (this.debugMode) {
                    this.drawDebugZones();
                }

            }

            drawDebugZones() {
                const basket = this.basket;
                const centerY = basket.y + basket.height / 2;
                const rimRadius = 4;
                const rimMargin = 0;

                this.fgCtx.save();

                this.fgCtx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
                this.fgCtx.lineWidth = 2;
                this.fgCtx.setLineDash([5, 5]);
                this.fgCtx.strokeRect(basket.x - 30, centerY - 30, basket.width + 60, 60);

                this.fgCtx.strokeStyle = 'rgba(0, 255, 0, 0.7)';
                this.fgCtx.lineWidth = 2;
                this.fgCtx.setLineDash([3, 3]);
                this.fgCtx.strokeRect(basket.x + rimMargin, centerY, basket.width - (rimMargin * 2), 30);

                this.fgCtx.strokeStyle = 'rgba(255, 0, 0, 0.8)';
                this.fgCtx.lineWidth = 2;
                this.fgCtx.setLineDash([]);
                this.fgCtx.beginPath();
                this.fgCtx.arc(basket.x, centerY, rimRadius + 12, 0, Math.PI * 2);
                this.fgCtx.stroke();

                this.fgCtx.beginPath();
                this.fgCtx.arc(basket.x + basket.width, centerY, rimRadius + 12, 0, Math.PI * 2);
                this.fgCtx.stroke();

                this.fgCtx.strokeStyle = 'rgba(0, 255, 255, 0.6)';
                this.fgCtx.lineWidth = 1;
                this.fgCtx.setLineDash([2, 2]);
                this.fgCtx.beginPath();
                this.fgCtx.moveTo(basket.x - 20, centerY);
                this.fgCtx.lineTo(basket.x + basket.width + 20, centerY);
                this.fgCtx.stroke();

                // Per-ball hitboxes and coords
                this.balls.forEach(ball => {
                    this.fgCtx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                    this.fgCtx.lineWidth = 1;
                    this.fgCtx.setLineDash([3, 3]);
                    this.fgCtx.beginPath();
                    this.fgCtx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                    this.fgCtx.stroke();

                    this.fgCtx.setLineDash([]);
                    this.fgCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    this.fgCtx.font = '12px monospace';
                    this.fgCtx.textAlign = 'center';
                    this.fgCtx.fillText(`X:${ball.x.toFixed(0)} Y:${ball.y.toFixed(0)}`, ball.x, ball.y + ball.radius + 14);
                });

                this.fgCtx.restore();
            }

            drawBasket() {
                const basket = this.basket;
                const centerY = basket.y + basket.height / 2;

                // Advance entrance animation at 30fps
                if (this.entranceAnimating) {
                    const now = Date.now();
                    const elapsed = now - this.entranceLastFrameTime;
                    const framesElapsed = Math.floor(elapsed / (1500 / 28));
                    if (framesElapsed > 0) {
                        this.entranceFrame = Math.min(this.entranceFrame + framesElapsed, 27);
                        this.entranceLastFrameTime = now - (elapsed % (1500 / 28));
                        if (this.entranceFrame >= 27) this.entranceAnimating = false;
                    }
                }

                const isFlashing = Date.now() < this.scoreFlashUntil;
                const imgWidth = 440;
                const cx = basket.x + basket.width / 2;
                const neutralImg = this.entranceFrames[this.entranceFrame];
                const bodyImg = (isFlashing && this.bobbyBodyHappyImg.complete && this.bobbyBodyHappyImg.naturalWidth > 0)
                    ? this.bobbyBodyHappyImg : neutralImg;
                const imgHeight = imgWidth * (bodyImg.naturalHeight / bodyImg.naturalWidth);
                const imgX = cx - imgWidth / 2;
                const imgY = this.canvas.height - imgHeight + 30;

                // Yellow glow behind bobby on score
                const glowElapsed = Date.now() - this.scoreFlashStart;
                const glowDuration = 500;
                const fadeInEnd = 60;
                let glowAlpha = 0;
                if (glowElapsed < glowDuration) {
                    if (glowElapsed < fadeInEnd) {
                        glowAlpha = glowElapsed / fadeInEnd;
                    } else {
                        glowAlpha = 1 - (glowElapsed - fadeInEnd) / (glowDuration - fadeInEnd);
                    }
                    glowAlpha = Math.max(0, Math.min(1, glowAlpha));
                }
                if (glowAlpha > 0) {
                    const gCx = cx;
                    const gCy = imgY + imgHeight * 0.4;
                    const gR = imgWidth * 0.7;
                    const grad = this.fgCtx.createRadialGradient(gCx, gCy, 0, gCx, gCy, gR);
                    grad.addColorStop(0,   `rgba(255, 228, 78, ${1.0 * glowAlpha})`);
                    grad.addColorStop(0.4, `rgba(255, 228, 78, ${0.5 * glowAlpha})`);
                    grad.addColorStop(1,   'rgba(255, 228, 78, 0)');
                    this.fgCtx.fillStyle = grad;
                    this.fgCtx.fillRect(gCx - gR, gCy - gR, gR * 2, gR * 2);
                }

                // Draw bobby image with subtle hand-drawn wobble
                if (bodyImg.complete && bodyImg.naturalWidth > 0) {
                    const wobblePhase = Math.floor(this.wobbleCounter / 20) % 2;
                    const shear = wobblePhase === 0 ? 0.008 : -0.008;
                    this.fgCtx.save();
                    this.fgCtx.translate(cx, imgY + imgHeight);
                    this.fgCtx.transform(1, 0, shear, 1, 0, 0);
                    this.fgCtx.drawImage(bodyImg, -imgWidth / 2, -imgHeight, imgWidth, imgHeight);
                    this.fgCtx.restore();
                }

                if (this.debugMode) {
                    this.fgCtx.font = '14px monospace';
                    this.fgCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    this.fgCtx.textAlign = 'center';
                    const basketCenterX = basket.x + basket.width / 2;
                    this.fgCtx.fillText(`Basket X:${basket.x.toFixed(0)} Y:${basket.y.toFixed(0)}`, basketCenterX, centerY - 25);
                }
            }

            gameLoop() {
                this.wobbleCounter++;
                this.updatePhysics();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        window.addEventListener('load', () => {
            applyBackground();
            console.log('Page loaded, starting game...');
            const game = new SimpleBasketGame();

            // On refresh, show click-to-resume overlay to unlock audio
            const resumeOverlay = document.getElementById('resumeOverlay');

            function unlockAudio() {
                Object.values(game.sounds).forEach(sd => {
                    sd.audio.muted = true;
                    sd.audio.play().then(() => {
                        sd.audio.pause();
                        sd.audio.muted = false;
                        sd.audio.currentTime = 0;
                    }).catch(() => {});
                });
            }

            function showStartOverlay() {
                game.ready = false;
                resumeOverlay.classList.add('active');
                resumeOverlay.addEventListener('click', () => {
                    unlockAudio();
                    game.ready = true;
                    resumeOverlay.classList.remove('active');
                    game.startEntranceAnimation();
                    if (SCHEDULE) game.startRoundTimer();
                }, { once: true });
            }

            _globalShowStartOverlay = showStartOverlay;
            showStartOverlay();

            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyD') {
                    game.debugMode = !game.debugMode;
                }
            });


            document.getElementById('newRoundBtn').addEventListener('click', () => {
                if (SCHEDULE) return; // auto-advances handle this in scheduled mode
                game.startNewRound();
                showStartOverlay();
            });
        });
    </script>
</body>
</html>
